<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AquaPark — Criar Operador</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&family=Sora:wght@600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0c0f14;--surface:#131820;--surface-2:#1a2030;
  --border:rgba(255,255,255,0.07);--border-2:rgba(255,255,255,0.11);
  --accent:#3b82f6;--accent-dim:rgba(59,130,246,0.10);
  --text-1:#f0f4ff;--text-2:#8892a4;--text-3:#4a5568;
  --green:#10b981;--red:#ef4444;--amber:#f59e0b;
  --radius:10px;--radius-lg:16px;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{
  font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text-1);
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  position:relative;overflow:hidden;
}
body::before{
  content:'';position:fixed;inset:0;
  background-image:
    linear-gradient(rgba(59,130,246,0.025) 1px,transparent 1px),
    linear-gradient(90deg,rgba(59,130,246,0.025) 1px,transparent 1px);
  background-size:48px 48px;pointer-events:none;
}

/* ── Card ── */
.card{
  position:relative;z-index:1;
  width:100%;max-width:420px;margin:24px;
  background:var(--surface);
  border:1px solid var(--border-2);
  border-radius:var(--radius-lg);
  padding:36px 32px;
  box-shadow:0 24px 64px rgba(0,0,0,0.6);
  animation:slideUp .45s cubic-bezier(.22,.68,0,1) both;
}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

/* ── Back link ── */
.back-link{
  display:inline-flex;align-items:center;gap:6px;
  font-size:1.1rem;color:var(--text-3);
  cursor:pointer;background:none;border:none;padding:0;
  font-family:'DM Sans',sans-serif;margin-bottom:24px;transition:color .2s;
}
.back-link:hover{color:var(--text-2);}

/* ── Header ── */
.card-header{margin-bottom:28px;}
.card-header h2{
  font-family:'Sora',sans-serif;
  font-size:1.3rem;font-weight:700;color:var(--text-1);margin-bottom:4px;
}
.card-header p{font-size:.82rem;color:var(--text-2);font-weight:300;line-height:1.5;}

.divider{height:1px;background:var(--border);margin:0 0 24px;}

/* ── Type indicator ── */
.type-indicator{
  display:flex;align-items:center;gap:8px;
  background:var(--surface-2);border:1px solid var(--border);
  border-radius:var(--radius);padding:10px 13px;margin-bottom:20px;
}
.type-dot{width:8px;height:8px;border-radius:50%;background:var(--accent);flex-shrink:0;}
.type-text{font-size:.78rem;color:var(--text-2);}
.type-text span{color:var(--accent);font-family:'DM Mono',monospace;font-size:.76rem;}

/* ── Fields ── */
.field{margin-bottom:16px;position:relative;}
label{
  display:block;font-size:.7rem;font-weight:500;
  letter-spacing:.8px;text-transform:uppercase;
  color:var(--text-2);margin-bottom:6px;
}
input{
  width:100%;background:var(--surface-2);
  border:1px solid var(--border-2);border-radius:var(--radius);
  padding:10px 40px 10px 13px;
  font-family:'DM Sans',sans-serif;font-size:.88rem;color:var(--text-1);
  outline:none;transition:border-color .2s,box-shadow .2s;
}
input::placeholder{color:var(--text-3);}
input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-dim);}
input.error-field{border-color:rgba(239,68,68,.5);}
input.ok-field{border-color:rgba(16,185,129,.4);}

/* Password toggle */
.pw-wrap{position:relative;}
.pw-toggle{
  position:absolute;right:11px;top:50%;transform:translateY(-50%);
  background:none;border:none;cursor:pointer;
  font-size:.85rem;color:var(--text-3);padding:2px;
  transition:color .2s;line-height:1;
}
.pw-toggle:hover{color:var(--text-2);}

/* Password match hint */
.pw-hint{
  font-size:.7rem;font-family:'DM Mono',monospace;
  margin-top:5px;min-height:14px;
}
.pw-hint.match{color:var(--green);}
.pw-hint.no-match{color:var(--red);}

/* ── Button ── */
.btn{
  width:100%;padding:12px;margin-top:8px;
  background:var(--accent);border:none;border-radius:var(--radius);
  font-family:'DM Sans',sans-serif;font-size:.88rem;font-weight:600;
  color:#fff;cursor:pointer;transition:opacity .2s,transform .15s;
  letter-spacing:.3px;
}
.btn:hover{opacity:.88;}
.btn:active{transform:scale(.98);}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}

/* ── Messages ── */
.msg{
  border-radius:var(--radius);padding:10px 13px;
  font-size:.8rem;margin-top:14px;display:none;
}
.msg.error  {background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.25);color:#fca5a5;}
.msg.success{background:rgba(16,185,129,.08);border:1px solid rgba(16,185,129,.25);color:#6ee7b7;}
.msg.show{display:block;}

/* ── Spinner ── */
.spinner{
  display:inline-block;width:14px;height:14px;
  border:2px solid rgba(255,255,255,.3);border-top-color:#fff;
  border-radius:50%;animation:spin .6s linear infinite;
  vertical-align:middle;margin-right:6px;
}
@keyframes spin{to{transform:rotate(360deg)}}

@media(max-width:480px){.card{padding:28px 20px;margin:16px;}}
</style>
</head>
<body>
<script>
  if(!localStorage.getItem('jwt_token'))window.location.href='login.html';
  if(localStorage.getItem('user_role')!=='supervisor')window.location.href='dashboard.html';
</script>

<div class="card">
  <button class="back-link" onclick="window.location.href='supervisor.html'">← Voltar ao painel</button>

  <div class="card-header">
    <h2>Criar novo operador</h2>
    <p>Preencha os dados para criar uma conta de acesso para um novo operador.</p>
  </div>
  <div class="divider"></div>

  <!-- <div class="type-indicator">
    <div class="type-dot"></div>
    <div class="type-text">Tipo de conta: <span>OPERADOR (u_type = 0)</span></div>
  </div> -->

  <!-- Username -->
  <div class="field">
    <label>Nome</label>
    <input type="text" id="username" placeholder="Nome do operador" autocomplete="off">
  </div>

  <!-- Email -->
  <div class="field">
    <label>E-mail</label>
    <input type="email" id="email" placeholder="operador@acquapark.com" autocomplete="off">
  </div>

  <!-- Senha -->
  <div class="field">
    <label>Senha</label>
    <div class="pw-wrap">
      <input type="password" id="password" placeholder="Mínimo 6 caracteres"
             autocomplete="new-password" oninput="checkMatch()">
      <button class="pw-toggle" type="button" onclick="togglePw('password', this)">👁</button>
    </div>
  </div>

  <!-- Confirmar senha -->
  <div class="field">
    <label>Confirmar senha</label>
    <div class="pw-wrap">
      <input type="password" id="confirm" placeholder="Repita a senha"
             autocomplete="new-password" oninput="checkMatch()">
      <button class="pw-toggle" type="button" onclick="togglePw('confirm', this)">👁</button>
    </div>
    <div class="pw-hint" id="pw-hint"></div>
  </div>

  <button class="btn" id="btn-create" onclick="createOperator()">Criar operador</button>
  <div class="msg" id="msg"></div>
</div>

<script>
const API_BASE = 'https://acqops-production.up.railway.app';

function togglePw(inputId, btn) {
  const input = document.getElementById(inputId);
  const show  = input.type === 'password';
  input.type  = show ? 'text' : 'password';
  btn.textContent = show ? '‼️' : '👁';
}

function checkMatch() {
  const pw   = document.getElementById('password').value;
  const conf = document.getElementById('confirm').value;
  const hint = document.getElementById('pw-hint');
  const ci   = document.getElementById('confirm');

  if (!conf) { hint.textContent = ''; hint.className = 'pw-hint'; ci.className = ''; return; }

  if (pw === conf) {
    hint.textContent = '✓ Senhas coincidem';
    hint.className   = 'pw-hint match';
    ci.className     = 'ok-field';
  } else {
    hint.textContent = '✗ Senhas não coincidem';
    hint.className   = 'pw-hint no-match';
    ci.className     = 'error-field';
  }
}

async function createOperator() {
  const username = document.getElementById('username').value.trim();
  const email    = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const confirm  = document.getElementById('confirm').value;
  const msg      = document.getElementById('msg');
  const btn      = document.getElementById('btn-create');

  msg.className  = 'msg';

  // Validações
  if (!username) {
    msg.textContent = 'Informe o username do operador.';
    msg.className = 'msg error show'; return;
  }
  if (!email || !email.includes('@')) {
    msg.textContent = 'Informe um e-mail válido.';
    msg.className = 'msg error show'; return;
  }
  if (password.length < 6) {
    msg.textContent = 'A senha deve ter ao menos 6 caracteres.';
    msg.className = 'msg error show'; return;
  }
  if (password !== confirm) {
    msg.textContent = 'As senhas não coincidem.';
    msg.className = 'msg error show'; return;
  }

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Criando...';

  try {
    const res = await fetch(`${API_BASE}/auth/signup`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + localStorage.getItem('jwt_token')
      },
      // Payload conforme especificação do backend
      body: JSON.stringify({
        email,
        password,
        username,
        u_type: 0   // sempre 0 para operador
      })
    });

    const data = await res.json().catch(() => ({}));

    if (res.ok) {
      msg.textContent = 'Operador criado com sucesso! Redirecionando...';
      msg.className   = 'msg success show';
      setTimeout(() => window.location.href = 'supervisor.html', 1500);
    } else {
      msg.textContent = data.message || 'Erro ao criar operador.';
      msg.className   = 'msg error show';
      btn.disabled    = false;
      btn.innerHTML   = 'Criar operador';
    }
  } catch (err) {
    msg.textContent = 'Erro de conexão com o servidor.';
    msg.className   = 'msg error show';
    btn.disabled    = false;
    btn.innerHTML   = 'Criar operador';
  }
}

document.addEventListener('keydown', e => {
  if (e.key === 'Enter') createOperator();
});
</script>
</body>
</html>

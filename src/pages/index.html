<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AquaPark — Acesso</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&family=Sora:wght@600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0c0f14; --surface:#131820; --surface-2:#1a2030;
  --border:rgba(255,255,255,0.07); --border-2:rgba(255,255,255,0.12);
  --accent:#3b82f6; --accent-dim:rgba(59,130,246,0.10); --accent-glow:rgba(59,130,246,0.22);
  --text-1:#f0f4ff; --text-2:#8892a4; --text-3:#4a5568;
  --green:#10b981; --red:#ef4444;
  --radius:10px; --radius-lg:16px;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;}
body{
  font-family:'DM Sans',sans-serif;
  background:var(--bg);
  color:var(--text-1);
  display:flex;align-items:center;justify-content:center;
  min-height:100vh;
  position:relative;overflow:hidden;
}

/* Subtle grid background */
body::before{
  content:'';
  position:fixed;inset:0;
  background-image:
    linear-gradient(rgba(59,130,246,0.03) 1px,transparent 1px),
    linear-gradient(90deg,rgba(59,130,246,0.03) 1px,transparent 1px);
  background-size:48px 48px;
  pointer-events:none;
}
/* Glow orb */
body::after{
  content:'';
  position:fixed;
  top:-20%;left:50%;transform:translateX(-50%);
  width:600px;height:400px;
  background:radial-gradient(ellipse,rgba(59,130,246,0.08) 0%,transparent 70%);
  pointer-events:none;
}

.card{
  position:relative;z-index:10;
  width:100%;max-width:400px;
  margin:20px;
  background:var(--surface);
  border:1px solid var(--border-2);
  border-radius:var(--radius-lg);
  padding:40px 36px;
  box-shadow:0 24px 64px rgba(0,0,0,0.6);
  animation:slideUp .5s cubic-bezier(.22,.68,0,1) both;
}
@keyframes slideUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}

/* Logo */
.logo{margin-bottom:36px;}
.logo-mark{
  display:inline-flex;align-items:center;gap:10px;
  margin-bottom:20px;
}
.logo-icon{
  width:36px;height:36px;
  background:var(--accent);
  border-radius:8px;
  display:flex;align-items:center;justify-content:center;
  font-size:1.1rem;
}
.logo-name{
  font-family:'Sora',sans-serif;
  font-size:1.1rem;font-weight:700;
  letter-spacing:2px;
  color:var(--text-1);
}
.logo h2{
  font-family:'Sora',sans-serif;
  font-size:1.5rem;font-weight:700;
  color:var(--text-1);
  margin-bottom:6px;
}
.logo p{font-size:.85rem;color:var(--text-2);font-weight:300;}

/* Divider */
.divider{
  height:1px;background:var(--border);
  margin:28px 0;
}

/* Form */
.field{margin-bottom:16px;}
label{
  display:block;
  font-size:.72rem;font-weight:500;
  letter-spacing:.8px;text-transform:uppercase;
  color:var(--text-2);margin-bottom:7px;
}
input{
  width:100%;
  background:var(--surface-2);
  border:1px solid var(--border-2);
  border-radius:var(--radius);
  padding:11px 14px;
  font-family:'DM Sans',sans-serif;
  font-size:.9rem;color:var(--text-1);
  outline:none;transition:border-color .2s,box-shadow .2s;
}
input::placeholder{color:var(--text-3);}
input:focus{
  border-color:var(--accent);
  box-shadow:0 0 0 3px var(--accent-dim);
}

.btn{
  width:100%;padding:12px;
  background:var(--accent);
  border:none;border-radius:var(--radius);
  font-family:'DM Sans',sans-serif;
  font-size:.9rem;font-weight:600;
  color:#fff;cursor:pointer;
  transition:opacity .2s,transform .15s;
  letter-spacing:.3px;
  margin-top:8px;
}
.btn:hover{opacity:.9;}
.btn:active{transform:scale(.98);}
.btn:disabled{opacity:.45;cursor:not-allowed;transform:none;}

.error{
  background:rgba(239,68,68,.08);
  border:1px solid rgba(239,68,68,.25);
  border-radius:var(--radius);
  color:#fca5a5;
  font-size:.8rem;padding:10px 13px;
  margin-top:14px;display:none;
}
.error.show{display:block;}

.spinner{
  display:inline-block;
  width:15px;height:15px;
  border:2px solid rgba(255,255,255,.3);
  border-top-color:#fff;
  border-radius:50%;
  animation:spin .6s linear infinite;
  vertical-align:middle;margin-right:7px;
}
@keyframes spin{to{transform:rotate(360deg)}}

.footer-note{
  margin-top:24px;text-align:center;
  font-size:.75rem;color:var(--text-3);
  font-family:'DM Mono',monospace;
}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-mark">
      <div class="logo-icon">🌊</div>
      <span class="logo-name">ACQUAPARK</span>
    </div>
    <h2>Bem-vindo de volta</h2>
    <p>Acesse sua conta para continuar</p>
  </div>

  <div class="field">
    <label>E-mail</label>
    <input type="email" id="email" placeholder="operador@acquapark.com" autocomplete="email">
  </div>
  <div class="field">
    <label>Senha</label>
    <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
  </div>

  <button class="btn" id="btn-login" onclick="doLogin()">Entrar</button>
  <div class="error" id="error-msg"></div>

  <div class="footer-note">AquaPark © 2026 — Sistema de Inspeções</div>
</div>

<script>
async function doLogin(){
  const email=document.getElementById('email').value.trim();
  const pwd=document.getElementById('password').value;
  const err=document.getElementById('error-msg');
  const btn=document.getElementById('btn-login');
  err.classList.remove('show');

  if(!email||!pwd){err.textContent='Preencha todos os campos.';err.classList.add('show');return;}

  btn.disabled=true;btn.innerHTML='<span class="spinner"></span>Verificando...';
  try{
    const res=await fetch('https://breathable-delma-claval.ngrok-free.dev/auth/signin',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({email,password:pwd})
    });
    const data=await res.json();
    if(res.ok&&data.access_token){
      localStorage.setItem('jwt_token',data.access_token);
      const role = data.u_type;
      // u_type: 1=supervisor, 0=operator
      const isSupervisor=(role===1||role==='supervisor'||role==='1');
      localStorage.setItem('user_role',isSupervisor?'supervisor':'operator');
      localStorage.setItem('username',data.username||data.user?.username||'Operador');
      localStorage.setItem('usr_id',data.usr_id);
      setTimeout(()=>{
        window.location.href=isSupervisor?'supervisor.html':'dashboard.html';
      },400);
    }else{
      err.textContent=data.message||'Credenciais inválidas.';
      err.classList.add('show');
      btn.disabled=false;btn.innerHTML='Entrar';
    }
  }catch{
    err.textContent='Erro de conexão com o servidor.';
    err.classList.add('show');
    btn.disabled=false;btn.innerHTML='Entrar';
  }
}
document.addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
</script>
</body>
</html>
